[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "validator"
version = "0.1.0"
description = "UAE DoH inpatient claim pre-submission validator"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0,<3.0",
    "fastapi>=0.115,<1.0",
    "uvicorn>=0.34,<1.0",
    "pyyaml>=6.0,<7.0",
]

[project.scripts]
validate-claim = "validator.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/validator"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]

[project.optional-dependencies]
dev = [
    "pytest>=8.0,<9.0",
    "pytest-cov>=6.0,<7.0",
    "httpx>=0.28,<1.0",
]
