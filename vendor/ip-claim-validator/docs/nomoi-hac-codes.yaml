# UAE DoH Hospital Acquired Conditions (HAC) List
# Source: DoH Claims and Adjudication Rules V2025.1, Section 6.2.5 Table 5
# Effective: 1 November 2025
# Extracted: 2026-04-15
#
# Usage: engine 7 (hac.py) checks claim diagnoses against hac_diagnosis_codes.
# A match with POA indicator N or U triggers HAC adjustment. Y and W do not.
# Procedure codes listed per HAC identify activities that must be reported
# with Activity.Net = 0 when the HAC is present.

version: "V2025.1"
effective_from: "2025-11-01"
source_section: "6.2.5"

# POA (Present on Admission) indicators and their HAC adjustment effect.
# Reference: HAC Appendix 2 in PDF section 6.2.5.
poa_indicators:
  Y:
    description: "Diagnosis was present at time of inpatient admission."
    triggers_hac_adjustment: false
  N:
    description: "Diagnosis was not present at time of inpatient admission."
    triggers_hac_adjustment: true
  U:
    description: "Documentation insufficient to determine if condition was present at the time of inpatient admission."
    triggers_hac_adjustment: true
  W:
    description: "Clinically undetermined. Provider unable to clinically determine whether the condition was present at the time of inpatient admission."
    triggers_hac_adjustment: false
  "1":
    description: "Diagnosis exempt from POA Indicator reporting."
    triggers_hac_adjustment: false

# Sentinel value used in procedure_codes when a HAC applies regardless of
# procedure performed. Engine logic: if procedure_codes == ["ALL"], the HAC
# rule is evaluated on any inpatient medical or surgical discharge.
procedure_codes_all_sentinel: "ALL"

