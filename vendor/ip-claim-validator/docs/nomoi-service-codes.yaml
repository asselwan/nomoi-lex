# UAE DoH Service Codes (Inpatient Subset)
# Source: DoH Claims and Adjudication Rules V2025.1
#   Appendix 6.2.1 Table 1 Service Codes (pp 38 onward)
#   Section 4.4.2.2.2 narrative (code 98 definition, pp 23 and 31)
# Effective: 1 November 2025
# Extracted: 2026-04-15
#
# Scope: only the service codes required for inpatient pre-submission
# validation (engines 1 through 9). Outpatient, home healthcare, telemedicine,
# dental, and ambulatory bundle codes are intentionally excluded.

version: "V2025.1"
effective_from: "2025-11-01"
source_sections: ["4.4.2.2.2", "6.2.1"]

# Room and board codes. Active entries only; retired entries noted in
# the status field so the engine can optionally warn on their use.
room_and_board:
  - code: "17-01"
    name: "Suite"
    status: active
    short_description: "Daily Room and Board charges for a single room plus one hall for guests"
    applicable_to: inpatient

  - code: "17-02"
    name: "VIP Room"
    status: active
    short_description: "Daily Room and Board charges for a single room with exclusive measurements"
    applicable_to: inpatient

  - code: "17-03"
    name: "First Class Room"
    status: active
    short_description: "Daily Room and Board charges for a single room with private amenities"
    applicable_to: inpatient

  - code: "17-04"
    name: "Shared Room"
    status: active
    short_description: "Daily Room and Board charges for a room accommodating 2 single patient beds"
    applicable_to: inpatient

  - code: "17-05"
    name: "Ward"
    status: active
    short_description: "Daily Room and Board charges for a single bed in a ward"
    applicable_to: inpatient

  - code: "17-06"
    name: "Royal Suite"
    status: active
    short_description: "Daily Room and Board charges for a suite with one or more additional halls"
    applicable_to: inpatient

  - code: "17-08"
    name: "Private Room Deluxe"
    status: retired
    short_description: "Retired room category, do not use on new claims"
    applicable_to: inpatient

  - code: "17-09"
    name: "Private Room Standard Suite"
    status: retired
    short_description: "Retired room category, do not use on new claims"
    applicable_to: inpatient

  - code: "17-10"
    name: "Isolation Room"
    status: active
    short_description: "Daily Room and Board charges for a single bed in an isolation room"
    applicable_to: inpatient

