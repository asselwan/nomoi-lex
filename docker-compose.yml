services:
  lex:
    build: .
    container_name: lex
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - LEX_ENV=production
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-}
    labels:
      - "coolify.managed=true"
      - "coolify.fqdn=lex.nomoi.ai"
